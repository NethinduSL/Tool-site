<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Movies & Anime — Bit X Tools</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
:root{--bg:#04040d;--s0:#07071a;--s1:#0a0a20;--s2:#0e0e28;--s3:#131330;--bd:rgba(120,110,220,0.08);--bd2:rgba(120,110,220,0.18);--tx:#e8ecff;--tx2:#b0b8e0;--g2:#7c5cfc;--g3:#a855f7;--grad:linear-gradient(135deg,#4f8ef7,#7c5cfc,#a855f7);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;cursor:none;}
a{color:inherit;text-decoration:none;}
*{-webkit-tap-highlight-color:transparent;}
body::after{content:'';position:fixed;inset:0;z-index:1;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");opacity:0.032;mix-blend-mode:overlay;}
.orb{position:fixed;border-radius:50%;pointer-events:none;filter:blur(100px);z-index:0;}
.orb1{width:600px;height:600px;background:radial-gradient(circle,rgba(168,85,247,0.1) 0%,transparent 70%);top:-150px;left:-100px;}
.orb2{width:500px;height:500px;background:radial-gradient(circle,rgba(79,142,247,0.08) 0%,transparent 70%);bottom:-100px;right:-100px;}
.grid-lines{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(124,92,252,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(124,92,252,0.03) 1px,transparent 1px);background-size:64px 64px;mask-image:radial-gradient(ellipse 80% 80% at 50% 40%,black 30%,transparent 100%);}
#cursor{position:fixed;width:10px;height:10px;background:#7c5cfc;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen;}
#cursor-ring{position:fixed;width:36px;height:36px;border:1.5px solid rgba(124,92,252,.5);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .2s,height .2s;mix-blend-mode:screen;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:18px 40px;display:flex;align-items:center;justify-content:space-between;background:rgba(4,4,13,0.85);backdrop-filter:blur(24px);border-bottom:1px solid var(--bd2);}
.nav-logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:32px;height:32px;border-radius:9px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;}
.nav-logo span{font-size:15px;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.nav-back{display:flex;align-items:center;gap:7px;color:var(--tx2);font-size:13px;font-weight:600;padding:8px 16px;border-radius:10px;border:1px solid var(--bd2);transition:all .2s;}
.nav-back:hover{color:var(--tx);background:var(--s1);}
.page{position:relative;z-index:2;padding:100px 24px 60px;max-width:1000px;margin:0 auto;}
.page-title{font-family:'Outfit',sans-serif;font-size:clamp(32px,5vw,52px);font-weight:900;letter-spacing:-.02em;margin-bottom:8px;}
.page-title span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.page-sub{color:var(--tx2);font-size:15px;line-height:1.7;margin-bottom:28px;}
.tab-row{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap;}
.tab-btn{padding:9px 18px;border-radius:10px;border:1px solid var(--bd);background:transparent;color:var(--tx2);font-family:'Sora',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:7px;}
.tab-btn:hover,.tab-btn.active{border-color:rgba(124,92,252,.4);background:rgba(124,92,252,.08);color:#a5b4fc;}
.panel{display:none;}
.panel.active{display:block;}
.search-area{background:rgba(10,10,28,.8);border:1px solid var(--bd2);border-radius:20px;padding:24px;margin-bottom:24px;position:relative;overflow:hidden;}
.search-area::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(124,92,252,.4),transparent);}
.search-row{display:flex;gap:10px;}
.search-input{flex:1;padding:13px 16px;border-radius:12px;background:var(--s2);border:1px solid var(--bd2);color:var(--tx);font-family:'Sora',sans-serif;font-size:14px;outline:none;transition:all .25s;}
.search-input:focus{border-color:rgba(124,92,252,.5);}
.search-input::placeholder{color:var(--tx2);opacity:.6;}
.search-btn{padding:13px 22px;border-radius:12px;background:var(--grad);color:#fff;border:none;font-family:'Sora',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:7px;white-space:nowrap;transition:all .22s;}
.search-btn:hover{box-shadow:0 0 20px rgba(124,92,252,.4);}
/* MOVIE & ANIME GRID */
.movie-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;}
.movie-card{background:rgba(10,10,28,.75);border:1px solid var(--bd);border-radius:16px;overflow:hidden;transition:all .28s cubic-bezier(.22,1,.36,1);}
.movie-card:hover{border-color:var(--bd2);transform:translateY(-4px);box-shadow:0 16px 48px rgba(124,92,252,.1);}
.movie-poster{width:100%;height:280px;object-fit:cover;background:var(--s2);}
.movie-body{padding:14px;}
.movie-title{font-size:13px;font-weight:700;line-height:1.4;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.movie-meta{font-size:11px;color:var(--tx2);margin-bottom:10px;}
.movie-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:9px;background:var(--grad);color:#fff;font-size:11px;font-weight:700;border:none;font-family:'Sora',sans-serif;cursor:pointer;transition:all .2s;width:100%;justify-content:center;}
.movie-btn:hover{box-shadow:0 0 14px rgba(124,92,252,.4);}
/* DOWNLOAD LINKS */
.dl-area{background:rgba(7,7,26,.9);border:1px solid var(--bd2);border-radius:16px;padding:24px;margin-top:20px;display:none;}
.dl-area.show{display:block;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.dl-title{font-size:15px;font-weight:700;margin-bottom:16px;color:#a5b4fc;}
.dl-back{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--tx2);margin-bottom:14px;cursor:pointer;font-weight:600;}
.dl-back:hover{color:var(--tx);}
.quality-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
.quality-item{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:8px;}
.quality-label{font-size:13px;font-weight:700;}
.quality-size{font-size:11px;color:var(--tx2);}
.quality-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:9px;background:var(--grad);color:#fff;font-size:11px;font-weight:700;text-decoration:none;transition:all .2s;}
.quality-btn:hover{box-shadow:0 0 12px rgba(124,92,252,.4);}
.loading{color:var(--tx2);font-size:13px;display:flex;align-items:center;gap:8px;padding:24px 0;}
.spin{animation:spin .8s linear infinite;font-size:18px;color:#7c5cfc;}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px;color:var(--tx2);font-size:14px;}
.empty i{font-size:32px;display:block;margin-bottom:10px;opacity:.3;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:rgba(124,92,252,.3);border-radius:4px;}
</style>
<link rel="stylesheet" href="style.css" id="extcss"/>
<script src="limit.js"></script>
</head>
<body>
<div id="cursor"></div><div id="cursor-ring"></div>
<div class="orb orb1"></div><div class="orb orb2"></div>
<div class="grid-lines"></div>

<nav>
  <a href="index.html" class="nav-logo"><div class="logo-icon"><i class="fas fa-wrench"></i></div><span>Bit X Tools</span></a>
  <a href="index.html" class="nav-back"><i class="fas fa-arrow-left"></i>All Tools</a>
</nav>

<div class="page">
  <div class="page-title"><span>Movies</span> & Anime</div>
  <p class="page-sub">Search Sinhala-dubbed movies and Chinese Anime / Donghua. Get direct download links and episode lists.</p>
  
  <div class="tab-row">
    <button class="tab-btn active" data-tab="search"><i class="fas fa-magnifying-glass" style="color:#a855f7"></i>Movie Search</button>
    <button class="tab-btn" data-tab="anime"><i class="fas fa-tv" style="color:#f472b6"></i>Anime Search</button>
  </div>

  <!-- MOVIE SEARCH (Sinhala Sub) -->
  <div class="panel active" id="tab-search">
    <div class="search-area">
      <div class="search-row">
        <input type="text" class="search-input" id="movieQuery" placeholder="Search movies (e.g. Avengers, Spider-Man)..."/>
        <button class="search-btn" onclick="searchMovies()"><i class="fas fa-search"></i>Search</button>
      </div>
    </div>
    <div id="movieGrid" class="movie-grid"></div>
    <div id="dlArea" class="dl-area">
      <div class="dl-back" onclick="closeDl()"><i class="fas fa-arrow-left"></i>Back to results</div>
      <div class="dl-title" id="dlTitle">Download Links</div>
      <div class="quality-grid" id="qualityGrid"></div>
    </div>
  </div>

  <!-- ANIME SEARCH (Animexin) -->
  <div class="panel" id="tab-anime">
    <div class="search-area">
      <div class="search-row">
        <input type="text" class="search-input" id="animeQuery" placeholder="Search anime / donghua (e.g. Martial God Asura, Swallowed Star)..."/>
        <button class="search-btn" onclick="searchAnime()"><i class="fas fa-search"></i>Search</button>
      </div>
    </div>
    <div id="animeGrid" class="movie-grid"></div>
  </div>
</div>

<script>
const cursor=document.getElementById('cursor'),ring=document.getElementById('cursor-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cursor.style.left=mx+'px';cursor.style.top=my+'px';});
function animRing(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(animRing);}
animRing();

document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
  };
});

const API='https://bit-x-apis.vercel.app';
let movieResults=[];

// ==================== MOVIE SEARCH (unchanged) ====================
async function searchMovies(){
  const q=document.getElementById('movieQuery').value.trim();
  if(!q) return;
  if(!await window.bxtCheckLimit()) return;
  document.getElementById('dlArea').classList.remove('show');
  document.getElementById('movieGrid').innerHTML=`<div class="loading" style="grid-column:1/-1"><i class="fas fa-spinner spin"></i>Searching movies...</div>`;
  try{
    const res=await fetch(`${API}/sinsub?q=${encodeURIComponent(q)}`);
    const data=await res.json();
    movieResults=data.results||data.movies||data.result||[];
    renderMovies();
  }catch(e){document.getElementById('movieGrid').innerHTML=`<div class="empty" style="grid-column:1/-1"><i class="fas fa-film"></i>Search failed. Try again.</div>`;}
}

function renderMovies(){
  const grid=document.getElementById('movieGrid');
  if(!movieResults.length){grid.innerHTML=`<div class="empty" style="grid-column:1/-1"><i class="fas fa-film"></i>No movies found.</div>`;return;}
  grid.innerHTML='';
  movieResults.forEach((m,i)=>{
    const card=document.createElement('div');
    card.className='movie-card';
    const url=m.url||m.link||m.href||'';
    card.innerHTML=`
      <img class="movie-poster" src="${m.thumbnail||m.image||m.poster||''}" onerror="this.style.background='var(--s3)'" loading="lazy"/>
      <div class="movie-body">
        <div class="movie-title">${m.title||m.name||'Movie '+(i+1)}</div>
        <div class="movie-meta">${m.year||''} ${m.quality||''}</div>
        <button class="movie-btn" onclick="getMovieLinks('${encodeURIComponent(url)}','${(m.title||'Movie').replace(/'/g,"\\'")}')"><i class="fas fa-download"></i>Get Links</button>
      </div>`;
    grid.appendChild(card);
  });
}

async function getMovieLinks(encodedUrl,title){
  if(!await window.bxtCheckLimit()) return;
  const url=decodeURIComponent(encodedUrl);
  const dlArea=document.getElementById('dlArea');
  const qualityGrid=document.getElementById('qualityGrid');
  dlArea.classList.add('show');
  document.getElementById('dlTitle').textContent=`Download: ${title}`;
  qualityGrid.innerHTML=`<div class="loading" style="grid-column:1/-1"><i class="fas fa-spinner spin"></i>Loading download links...</div>`;
  dlArea.scrollIntoView({behavior:'smooth',block:'start'});
  try{
    const res=await fetch(`${API}/sinsubd?q=${encodeURIComponent(url)}`);
    const data=await res.json();
    const links=data.links||data.qualities||data.result||[];
    if(!links.length){qualityGrid.innerHTML='<div style="color:var(--tx2);font-size:13px;grid-column:1/-1">No download links found.</div>';return;}
    qualityGrid.innerHTML='';
    links.forEach(l=>{
      const linkUrl=l.url||l.link||l.href||l;
      const label=l.label||l.quality||l.name||'Download';
      const size=l.size||l.filesize||'';
      const div=document.createElement('div');
      div.className='quality-item';
      div.innerHTML=`<div class="quality-label"><i class="fas fa-film" style="margin-right:6px;color:#a5b4fc"></i>${label}</div>${size?`<div class="quality-size">${size}</div>`:''}<a href="${linkUrl}" target="_blank" class="quality-btn"><i class="fas fa-download"></i>Download</a>`;
      qualityGrid.appendChild(div);
    });
  }catch(e){qualityGrid.innerHTML='<div style="color:#fca5a5;font-size:13px;grid-column:1/-1">Failed to load links. Try again.</div>';}
}

function closeDl(){document.getElementById('dlArea').classList.remove('show');}

// ==================== ANIME SEARCH (New - Animexin) ====================
async function searchAnime(){
  const q = document.getElementById('animeQuery').value.trim();
  if(!q) return;
  if(!await window.bxtCheckLimit()) return;

  const grid = document.getElementById('animeGrid');
  grid.innerHTML = `<div class="loading" style="grid-column:1/-1"><i class="fas fa-spinner spin"></i>Searching anime...</div>`;

  try{
    const res = await fetch(`${API}/animexin-search?q=${encodeURIComponent(q)}`);
    const data = await res.json();
    const items = data.response || data.results || data.anime || [];

    if(!items.length){
      grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><i class="fas fa-tv"></i>No anime found.</div>`;
      return;
    }

    grid.innerHTML = '';
    items.forEach(a => {
      const card = document.createElement('div');
      card.className = 'movie-card';
      const link = a.link || a.url || '#';
      const image = a.image || a.thumbnail || '';

      card.innerHTML = `
        <img class="movie-poster" src="${image}" onerror="this.style.background='var(--s3)'" loading="lazy"/>
        <div class="movie-body">
          <div class="movie-title">${a.title || 'Unknown Title'}</div>
          <button class="movie-btn" onclick="window.location.href='movies.html?type=anime&url=${encodeURIComponent(link)}'">
            <i class="fas fa-play"></i>View Episodes
          </button>
        </div>`;
      grid.appendChild(card);
    });
  }catch(e){
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><i class="fas fa-tv"></i>Search failed. Try again.</div>`;
  }
}

// Enter key support
document.getElementById('movieQuery').addEventListener('keydown', e => { if(e.key==='Enter') searchMovies(); });
document.getElementById('animeQuery').addEventListener('keydown', e => { if(e.key==='Enter') searchAnime(); });
</script>
</body>
</html>
