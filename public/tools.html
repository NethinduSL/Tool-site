<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tools — Bit X Tools</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
:root{--bg:#04040d;--s0:#07071a;--s1:#0a0a20;--s2:#0e0e28;--s3:#131330;--bd:rgba(120,110,220,0.08);--bd2:rgba(120,110,220,0.18);--tx:#e8ecff;--tx2:#b0b8e0;--g2:#7c5cfc;--grad:linear-gradient(135deg,#4f8ef7,#7c5cfc,#a855f7);}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;cursor:none;transition:background .3s,color .3s;}
a{color:inherit;text-decoration:none;}
*{-webkit-tap-highlight-color:transparent;}
button,a{touch-action:manipulation;}
button{font-family:'Sora',sans-serif;}
@media(pointer:coarse){#cursor,#cursor-ring{display:none !important;}}
body::after{content:'';position:fixed;inset:0;z-index:1;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");opacity:0.032;mix-blend-mode:overlay;}
.orb{position:fixed;border-radius:50%;pointer-events:none;filter:blur(100px);z-index:0;}
.orb1{width:600px;height:600px;background:radial-gradient(circle,rgba(251,191,36,0.08) 0%,transparent 70%);top:-150px;left:-100px;}
.orb2{width:500px;height:500px;background:radial-gradient(circle,rgba(168,85,247,0.08) 0%,transparent 70%);bottom:-100px;right:-100px;}
.grid-lines{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(124,92,252,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(124,92,252,0.03) 1px,transparent 1px);background-size:64px 64px;mask-image:radial-gradient(ellipse 80% 80% at 50% 40%,black 30%,transparent 100%);}
#cursor{position:fixed;width:10px;height:10px;background:#7c5cfc;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen;}
#cursor-ring{position:fixed;width:36px;height:36px;border:1.5px solid rgba(124,92,252,.5);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .2s,height .2s;mix-blend-mode:screen;}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:14px 32px;display:flex;align-items:center;justify-content:space-between;background:rgba(4,4,13,0.9);backdrop-filter:blur(24px);border-bottom:1px solid var(--bd2);}
.nav-logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:32px;height:32px;border-radius:9px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;flex-shrink:0;}
.nav-logo span{font-size:15px;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.nav-back{display:flex;align-items:center;gap:7px;color:var(--tx2);font-size:13px;font-weight:600;padding:8px 16px;border-radius:10px;border:1px solid var(--bd2);transition:all .2s;}
.nav-back:hover{color:var(--tx);background:var(--s1);}

/* ── PAGE LAYOUT ── */
.page{position:relative;z-index:2;padding:82px 20px 60px;max-width:960px;margin:0 auto;}
.page-title{font-family:'Outfit',sans-serif;font-size:clamp(28px,5vw,52px);font-weight:900;letter-spacing:-.02em;margin-bottom:8px;}
.page-title span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.page-sub{color:var(--tx2);font-size:14px;line-height:1.7;margin-bottom:24px;max-width:560px;}

/* ── TAB ROW — scrollable on mobile ── */
.tab-scroll-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:24px;padding-bottom:4px;}
.tab-scroll-wrap::-webkit-scrollbar{height:3px;}
.tab-scroll-wrap::-webkit-scrollbar-thumb{background:rgba(124,92,252,.3);border-radius:4px;}
.tab-row{display:flex;gap:8px;white-space:nowrap;min-width:max-content;}
.tab-btn{padding:9px 16px;border-radius:10px;border:1px solid var(--bd);background:transparent;color:var(--tx2);font-family:'Sora',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;flex-shrink:0;}
.tab-btn:hover,.tab-btn.active{border-color:rgba(124,92,252,.4);background:rgba(124,92,252,.08);color:#a5b4fc;}
.panel{display:none;animation:fadeIn .25s ease;}
.panel.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── TOOL BOX ── */
.tool-box{background:rgba(10,10,28,.85);border:1px solid var(--bd2);border-radius:20px;padding:24px;position:relative;overflow:hidden;margin-bottom:20px;}
.tool-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(124,92,252,.4),transparent);}
.tool-label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#a5b4fc;margin-bottom:10px;}

/* ── INPUT ROW — stacks on mobile ── */
.input-row{display:flex;gap:10px;margin-bottom:16px;}
@media(max-width:560px){.input-row{flex-direction:column;}}
input[type=text],input[type=email]{flex:1;padding:13px 16px;border-radius:12px;background:var(--s2);border:1px solid var(--bd2);color:var(--tx);font-family:'Sora',sans-serif;font-size:14px;outline:none;transition:all .25s;width:100%;}
input[type=text]:focus,input[type=email]:focus{border-color:rgba(124,92,252,.5);box-shadow:0 0 0 3px rgba(124,92,252,.08);}
input[type=text]::placeholder,input[type=email]::placeholder{color:var(--tx2);opacity:.6;}
.action-btn{padding:13px 22px;border-radius:12px;background:var(--grad);color:#fff;border:none;font-family:'Sora',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:7px;white-space:nowrap;transition:all .22s;flex-shrink:0;}
.action-btn:hover{box-shadow:0 0 20px rgba(124,92,252,.4);}
.action-btn:disabled{opacity:.5;cursor:default;}
@media(max-width:560px){.action-btn{width:100%;}}
.result-card{background:rgba(7,7,26,.9);border:1px solid var(--bd2);border-radius:16px;padding:18px;display:none;}
.result-card.show{display:block;animation:fadeIn .3s ease;}

/* ── WEATHER ── */
.weather-main{display:flex;align-items:center;gap:20px;margin-bottom:16px;flex-wrap:wrap;}
.weather-icon-big{font-size:56px;line-height:1;}
.weather-temp{font-family:'JetBrains Mono',monospace;font-size:clamp(36px,8vw,52px);font-weight:700;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.weather-city{font-size:17px;font-weight:700;margin-bottom:4px;}
.weather-desc{font-size:13px;color:var(--tx2);text-transform:capitalize;}
.weather-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px;}
@media(max-width:480px){.weather-grid{grid-template-columns:1fr 1fr;}}
.weather-stat{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:12px;text-align:center;}
.weather-stat-val{font-size:16px;font-weight:700;color:#a5b4fc;font-family:'JetBrains Mono',monospace;}
.weather-stat-label{font-size:10px;color:var(--tx2);margin-top:3px;text-transform:uppercase;letter-spacing:.06em;}

/* ── URL SHORTENER ── */
.short-result{font-family:'JetBrains Mono',monospace;font-size:14px;color:#4ade80;background:rgba(74,222,128,.06);border:1px solid rgba(74,222,128,.2);border-radius:10px;padding:14px;word-break:break-all;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.copy-short{padding:7px 14px;border-radius:8px;background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.25);color:#4ade80;font-size:11px;font-weight:700;cursor:pointer;font-family:'Sora',sans-serif;white-space:nowrap;transition:all .18s;flex-shrink:0;}
.copy-short:hover{background:rgba(74,222,128,.3);}

/* ── NEWS ── */
.news-btns{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.news-btns .action-btn{flex:1;min-width:140px;}
.news-list{display:flex;flex-direction:column;gap:10px;}
.news-item{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:14px;display:flex;gap:12px;align-items:flex-start;transition:all .2s;}
.news-item:hover{border-color:var(--bd2);}
.news-thumb{width:72px;height:54px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--s3);}
@media(max-width:480px){.news-thumb{width:56px;height:42px;}}
.news-content{flex:1;min-width:0;}
.news-title{font-size:13px;font-weight:700;line-height:1.4;margin-bottom:5px;word-break:break-word;}
.news-meta{font-size:11px;color:var(--tx2);}
.news-link{display:inline-flex;align-items:center;gap:5px;margin-top:7px;font-size:11px;color:#a5b4fc;font-weight:600;}

/* ── STICKERS ── */
.sticker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:8px;}
.sticker-item{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:8px;text-align:center;}
.sticker-item img{width:54px;height:54px;object-fit:contain;}
@media(max-width:400px){.sticker-grid{grid-template-columns:repeat(4,1fr);}
.sticker-item img{width:44px;height:44px;}}

/* ── SONGS ── */
.song-item{display:flex;align-items:center;gap:12px;background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:12px;margin-bottom:10px;}
.song-thumb{width:52px;height:52px;border-radius:10px;object-fit:cover;background:var(--s3);flex-shrink:0;}
.song-info{flex:1;min-width:0;}
.song-title{font-size:13px;font-weight:700;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.song-artist{font-size:11px;color:var(--tx2);}
.song-btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:8px;background:var(--grad);color:#fff;font-size:11px;font-weight:700;text-decoration:none;white-space:nowrap;flex-shrink:0;}
@media(max-width:400px){.song-item{flex-wrap:wrap;}.song-btn{width:100%;justify-content:center;margin-top:4px;}}

/* ── LOADING / ERROR ── */
.loading{color:var(--tx2);font-size:13px;display:flex;align-items:center;gap:8px;padding:20px 0;}
.spin{animation:spin .8s linear infinite;font-size:18px;color:#7c5cfc;}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.error{color:#fca5a5;font-size:13px;padding:12px;background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);border-radius:10px;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:rgba(124,92,252,.3);border-radius:4px;}

/* ── RESPONSIVE TWEAKS ── */
@media(max-width:768px){
  nav{padding:12px 16px;}
  .page{padding:76px 16px 48px;}
  .tool-box{padding:18px;}
}
@media(max-width:480px){
  .page-title{font-size:clamp(24px,7vw,38px);}
  .page-sub{font-size:13px;}
}
</style>
<link rel="stylesheet" href="style.css" id="extcss"/>
<script src="limit.js"></script>
</head>
<body>
<div id="cursor"></div><div id="cursor-ring"></div>
<div class="orb orb1"></div><div class="orb orb2"></div>
<div class="grid-lines"></div>

<div id="site-nav" data-usage="Select a tool → Use instantly"></div>

<div class="page">
  <div class="page-title"><span>More</span> Tools</div>
  <p class="page-sub">Weather, URL shortener, Telegram stickers, Sinhala songs, and Sri Lanka news — all in one place.</p>

  <!-- Scrollable tab row — works great on mobile -->
  <div class="tab-scroll-wrap">
    <div class="tab-row">
      <button class="tab-btn active" data-tab="weather"><i class="fas fa-cloud-sun" style="color:#fbbf24"></i>Weather</button>
      <button class="tab-btn" data-tab="shorten"><i class="fas fa-link" style="color:#4f8ef7"></i>URL Shortener</button>
      <button class="tab-btn" data-tab="news"><i class="fas fa-newspaper" style="color:#fb923c"></i>News</button>
      <button class="tab-btn" data-tab="stickers"><i class="fas fa-face-smile" style="color:#34d399"></i>Stickers</button>
      <button class="tab-btn" data-tab="sinsong"><i class="fas fa-music" style="color:#f472b6"></i>Sinhala Songs</button>
    </div>
  </div>

  <!-- WEATHER -->
  <div class="panel active" id="tab-weather">
    <div class="tool-box">
      <div class="tool-label"><i class="fas fa-cloud-sun" style="margin-right:6px;color:#fbbf24"></i>Check Weather</div>
      <div class="input-row">
        <input type="text" id="weatherCity" placeholder="Enter city name (e.g. Colombo, London)..."/>
        <button class="action-btn" onclick="getWeather()"><i class="fas fa-search"></i>Get Weather</button>
      </div>
      <div class="result-card" id="weatherResult"></div>
    </div>
  </div>

  <!-- URL SHORTENER -->
  <div class="panel" id="tab-shorten">
    <div class="tool-box">
      <div class="tool-label"><i class="fas fa-link" style="margin-right:6px;color:#4f8ef7"></i>Shorten URL</div>
      <div class="input-row">
        <input type="text" id="longUrl" placeholder="Paste long URL here..."/>
        <button class="action-btn" onclick="shortenUrl()"><i class="fas fa-bolt"></i>Shorten</button>
      </div>
      <div class="result-card" id="shortenResult"></div>
    </div>
  </div>

  <!-- NEWS -->
  <div class="panel" id="tab-news">
    <div class="tool-box">
      <div class="tool-label"><i class="fas fa-newspaper" style="margin-right:6px;color:#fb923c"></i>Latest Sri Lanka News</div>
      <div class="news-btns">
        <button class="action-btn" onclick="getNews('dailymirror')" style="background:rgba(251,146,60,.15);color:#fb923c;box-shadow:none;border:1px solid rgba(251,146,60,.3)"><i class="fas fa-newspaper"></i>Daily Mirror</button>
        <button class="action-btn" onclick="getNews('hirunews')" style="background:rgba(79,142,247,.15);color:#4f8ef7;box-shadow:none;border:1px solid rgba(79,142,247,.3)"><i class="fas fa-tv"></i>Hiru News</button>
      </div>
      <div id="newsResult"></div>
    </div>
  </div>

  <!-- STICKERS -->
  <div class="panel" id="tab-stickers">
    <div class="tool-box">
      <div class="tool-label"><i class="fas fa-face-smile" style="margin-right:6px;color:#34d399"></i>Telegram Sticker Pack</div>
      <div class="input-row">
        <input type="text" id="stickerPack" placeholder="Enter sticker pack name (e.g. HotCherry)..."/>
        <button class="action-btn" onclick="getStickers()"><i class="fas fa-download"></i>Get Stickers</button>
      </div>
      <div class="result-card" id="stickerResult"></div>
    </div>
  </div>

  <!-- SINHALA SONGS -->
  <div class="panel" id="tab-sinsong">
    <div class="tool-box">
      <div class="tool-label"><i class="fas fa-music" style="margin-right:6px;color:#f472b6"></i>Search Sinhala Songs</div>
      <div class="input-row">
        <input type="text" id="songQuery" placeholder="Search song name or artist..."/>
        <button class="action-btn" onclick="searchSong()"><i class="fas fa-search"></i>Search</button>
      </div>
      <div id="songResult"></div>
    </div>
  </div>
</div>

<script>
// ── CURSOR ──
const cursor=document.getElementById('cursor'),ring=document.getElementById('cursor-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cursor.style.left=mx+'px';cursor.style.top=my+'px';});
function animRing(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(animRing);}
animRing();

// ── TABS ──
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
    // Scroll active tab into view on mobile
    btn.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  };
});
const urlType=new URLSearchParams(location.search).get('type');
if(urlType){const btn=document.querySelector(`.tab-btn[data-tab="${urlType}"]`);if(btn)btn.click();}

const API='https://bit-x-apis.vercel.app';
const ICONS={'Clear':'☀️','Clouds':'☁️','Rain':'🌧️','Drizzle':'🌦️','Thunderstorm':'⛈️','Snow':'❄️','Mist':'🌫️','Fog':'🌫️','Haze':'🌫️'};

async function getWeather(){
  const city=document.getElementById('weatherCity').value.trim();
  if(!city)return;
  if(!await window.bxtCheckLimit()) return;
  const el=document.getElementById('weatherResult');
  el.className='result-card show';
  el.innerHTML=`<div class="loading"><i class="fas fa-spinner spin"></i>Fetching weather...</div>`;
  try{
    const res=await fetch(`${API}/weather?q=${encodeURIComponent(city)}`);
    const data=await res.json();
    if(!data.status&&!data.city&&!data.temperature)throw new Error('Not found');
    const w=data.weather||data;
    const icon=ICONS[w.condition||w.main||'']||'🌤️';
    const temp=w.temperature||w.temp||w.celsius||'--';
    const feels=w.feels_like||w.feelsLike||'--';
    const humidity=w.humidity||'--';
    const wind=w.wind_speed||w.wind||'--';
    const desc=w.description||w.condition||'';
    const cityName=w.city||w.location||data.city||city;
    el.innerHTML=`
      <div class="weather-main">
        <div class="weather-icon-big">${icon}</div>
        <div>
          <div class="weather-temp">${temp}°C</div>
          <div class="weather-city">${cityName}</div>
          <div class="weather-desc">${desc}</div>
        </div>
      </div>
      <div class="weather-grid">
        <div class="weather-stat"><div class="weather-stat-val">${feels}°C</div><div class="weather-stat-label">Feels Like</div></div>
        <div class="weather-stat"><div class="weather-stat-val">${humidity}%</div><div class="weather-stat-label">Humidity</div></div>
        <div class="weather-stat"><div class="weather-stat-val">${wind} km/h</div><div class="weather-stat-label">Wind</div></div>
      </div>`;
  }catch(e){el.innerHTML=`<div class="error"><i class="fas fa-triangle-exclamation" style="margin-right:7px"></i>Could not find weather for "${city}". Check the city name.</div>`;}
}

async function shortenUrl(){
  const url=document.getElementById('longUrl').value.trim();
  if(!url)return;
  if(!await window.bxtCheckLimit()) return;
  const el=document.getElementById('shortenResult');
  el.className='result-card show';
  el.innerHTML=`<div class="loading"><i class="fas fa-spinner spin"></i>Shortening URL...</div>`;
  try{
    const res=await fetch(`${API}/shorten?q=${encodeURIComponent(url)}`);
    const data=await res.json();
    const short=data.short||data.short_url||data.result||data.url||'';
    if(!short)throw new Error('No short URL returned');
    el.innerHTML=`<div class="short-result"><span>${short}</span><button class="copy-short" onclick="navigator.clipboard.writeText('${short}').then(()=>this.textContent='✓ Copied!')"><i class="fas fa-copy"></i> Copy</button></div>`;
  }catch(e){el.innerHTML=`<div class="error"><i class="fas fa-triangle-exclamation" style="margin-right:7px"></i>Failed to shorten URL. Try again.</div>`;}
}

async function getNews(source='dailymirror'){
  if(!await window.bxtCheckLimit()) return;
  const el=document.getElementById('newsResult');
  el.innerHTML=`<div class="loading"><i class="fas fa-spinner spin"></i>Fetching news...</div>`;
  try{
    const endpoint=source==='hirunews'?'/hiru':'/dailymirror';
    const res=await fetch(`${API}${endpoint}`);
    const data=await res.json();
    const items=data.news||data.articles||data.results||data.result||[];
    if(!items.length){el.innerHTML='<div style="color:var(--tx2);font-size:13px">No news articles found.</div>';return;}
    el.innerHTML='<div class="news-list"></div>';
    const list=el.querySelector('.news-list');
    items.slice(0,12).forEach(n=>{
      const div=document.createElement('div');
      div.className='news-item';
      const url=n.url||n.link||n.href||'#';
      div.innerHTML=`${n.thumbnail||n.image?`<img class="news-thumb" src="${n.thumbnail||n.image}" onerror="this.style.display='none'" loading="lazy"/>`:''}<div class="news-content"><div class="news-title">${n.title||n.headline||'Article'}</div><div class="news-meta">${n.date||n.time||n.published||''}</div><a href="${url}" target="_blank" class="news-link"><i class="fas fa-external-link-alt"></i>Read More</a></div>`;
      list.appendChild(div);
    });
  }catch(e){el.innerHTML='<div class="error">Failed to load news.</div>';}
}

async function getStickers(){
  const pack=document.getElementById('stickerPack').value.trim();
  if(!pack)return;
  if(!await window.bxtCheckLimit()) return;
  const el=document.getElementById('stickerResult');
  el.className='result-card show';
  el.innerHTML=`<div class="loading"><i class="fas fa-spinner spin"></i>Fetching stickers...</div>`;
  try{
    const res=await fetch(`${API}/telegrams?q=${encodeURIComponent(pack)}`);
    const data=await res.json();
    const stickers=data.stickers||data.result||data.images||[];
    if(!stickers.length){el.innerHTML='<div style="color:var(--tx2);font-size:13px">No stickers found for this pack name.</div>';return;}
    el.innerHTML=`<div class="tool-label">Found ${stickers.length} stickers</div><div class="sticker-grid"></div>`;
    const grid=el.querySelector('.sticker-grid');
    stickers.forEach(s=>{
      const url=typeof s==='string'?s:(s.url||s.file||s.image||s);
      const div=document.createElement('div');
      div.className='sticker-item';
      div.innerHTML=`<img src="${url}" loading="lazy" onerror="this.parentElement.style.display='none'"/>`;
      grid.appendChild(div);
    });
  }catch(e){el.innerHTML='<div class="error">Could not load stickers. Check pack name.</div>';}
}

async function searchSong(){
  const q=document.getElementById('songQuery').value.trim();
  if(!q)return;
  if(!await window.bxtCheckLimit()) return;
  const el=document.getElementById('songResult');
  el.innerHTML=`<div class="loading"><i class="fas fa-spinner spin"></i>Searching songs...</div>`;
  try{
    const res=await fetch(`${API}/sinsong?q=${encodeURIComponent(q)}`);
    const data=await res.json();
    const songs=data.songs||data.results||data.result||[];
    if(!songs.length){el.innerHTML='<div style="color:var(--tx2);font-size:13px;padding:12px 0">No songs found.</div>';return;}
    el.innerHTML='';
    songs.forEach(s=>{
      const div=document.createElement('div');
      div.className='song-item';
      const dlUrl=s.download||s.url||s.link||'#';
      div.innerHTML=`${s.thumbnail||s.image?`<img class="song-thumb" src="${s.thumbnail||s.image}" onerror="this.style.display='none'" loading="lazy"/>`:''}<div class="song-info"><div class="song-title">${s.title||s.name||'Song'}</div><div class="song-artist">${s.artist||s.singer||''}</div></div>${dlUrl!=='#'?`<a href="${dlUrl}" target="_blank" class="song-btn"><i class="fas fa-download"></i>Download</a>`:''}`;
      el.appendChild(div);
    });
  }catch(e){el.innerHTML='<div class="error">Search failed. Try again.</div>';}
}

// ── Enter key shortcuts ──
document.getElementById('weatherCity').addEventListener('keydown',e=>{if(e.key==='Enter')getWeather();});
document.getElementById('longUrl').addEventListener('keydown',e=>{if(e.key==='Enter')shortenUrl();});
document.getElementById('stickerPack').addEventListener('keydown',e=>{if(e.key==='Enter')getStickers();});
document.getElementById('songQuery').addEventListener('keydown',e=>{if(e.key==='Enter')searchSong();});
</script>
